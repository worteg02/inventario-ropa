<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventario de Ropa</title>

<style>

:root{
    --bg:#0f172a;
    --panel:#1e293b;
    --panel2:#334155;
    --accent:#38bdf8;
    --success:#10b981;
    --text:#e2e8f0;
    --border:#475569;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
    padding:30px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.header{
    margin-bottom:25px;
}

.header h1{
    font-size:32px;
}

.header p{
    color:#94a3b8;
    margin-top:5px;
}

.card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.card-title{
    margin-bottom:15px;
    color:var(--accent);
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:var(--panel2);
    color:white;
}

input:focus{
    outline:2px solid var(--accent);
}

button{
    background:var(--accent);
    color:black;
    font-weight:bold;
    border:none;
    border-radius:8px;
    padding:12px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.stat{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px;
}

.stat h2{
    font-size:28px;
    color:var(--accent);
}

.stat span{
    color:#94a3b8;
}

.search{
    margin-bottom:15px;
}

.search input{
    width:100%;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:var(--panel2);
}

th{
    text-align:left;
    padding:15px;
}

td{
    padding:15px;
    border-top:1px solid var(--border);
}

tr:hover{
    background:#22304b;
}

.loading{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
    <h1>📦 Sistema de Inventario</h1>
    <p>Gestión de prendas utilizando Google Sheets como base de datos</p>
</div>

<div class="stats">

    <div class="stat">
        <span>Productos</span>
        <h2 id="totalProductos">0</h2>
    </div>

    <div class="stat">
        <span>Stock Total</span>
        <h2 id="totalStock">0</h2>
    </div>

    <div class="stat">
        <span>Valor Inventario</span>
        <h2 id="valorInventario">$0</h2>
    </div>

</div>

<div class="card">

    <h3 class="card-title">➕ Nuevo Producto</h3>

    <div class="form-grid">

        <input id="nombre" placeholder="Nombre">

        <input id="talle" placeholder="Talle">

        <input id="color" placeholder="Color">

        <input id="precio" type="number" placeholder="Precio">

        <input id="stock" type="number" placeholder="Stock">

        <button onclick="guardarProducto()">
            Guardar Producto
        </button>

    </div>

</div>

<div class="card">

    <div class="search">
        <input
            id="buscar"
            placeholder="Buscar producto..."
            onkeyup="filtrarTabla()">
    </div>

    <table>

        <thead>
            <tr>
                <th>Producto</th>
                <th>Talle</th>
                <th>Color</th>
                <th>Precio</th>
                <th>Stock</th>
            </tr>
        </thead>

        <tbody id="tbody">

            <tr>
                <td colspan="5" class="loading">
                    Cargando información...
                </td>
            </tr>

        </tbody>

    </table>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxY2MJwvQ4kO2qv8eiWVgfMfQ6zsXXgXCyxXIqBl4HtDZGa3_LTH-FU5OfvOvbhpfn2iQ/exec";

let inventario=[];

async function guardarProducto(){

    const producto = {
        nombre:document.getElementById("nombre").value,
        talle:document.getElementById("talle").value,
        color:document.getElementById("color").value,
        precio:document.getElementById("precio").value,
        stock:document.getElementById("stock").value
    };

    if(!producto.nombre){
        alert("Ingrese un nombre");
        return;
    }

    try{

        await fetch(API_URL,{
            method:"POST",
            body:JSON.stringify(producto)
        });

        limpiarFormulario();

        await cargarProductos();

        alert("Producto guardado correctamente");

    }catch(error){

        console.error(error);

        alert("Error guardando producto");

    }

}

function limpiarFormulario(){

    nombre.value="";
    talle.value="";
    color.value="";
    precio.value="";
    stock.value="";

}

async function cargarProductos(){

    try{

        const response =
            await fetch(API_URL);

        inventario =
            await response.json();

        renderizarTabla();

        actualizarDashboard();

    }
    catch(error){

        console.error(error);

    }

}

function renderizarTabla(){

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML="";

    inventario.forEach(item=>{

        tbody.innerHTML += `
        <tr>
            <td>${item.nombre}</td>
            <td>${item.talle}</td>
            <td>${item.color}</td>
            <td>$${item.precio}</td>
            <td>${item.stock}</td>
        </tr>
        `;

    });

}

function actualizarDashboard(){

    let stockTotal=0;
    let valorTotal=0;

    inventario.forEach(item=>{

        stockTotal +=
            Number(item.stock);

        valorTotal +=
            Number(item.stock) *
            Number(item.precio);

    });

    document.getElementById(
        "totalProductos"
    ).innerText =
        inventario.length;

    document.getElementById(
        "totalStock"
    ).innerText =
        stockTotal;

    document.getElementById(
        "valorInventario"
    ).innerText =
        "$" + valorTotal.toLocaleString();

}

function filtrarTabla(){

    const texto =
        document.getElementById("buscar")
        .value
        .toLowerCase();

    const filas =
        document.querySelectorAll("#tbody tr");

    filas.forEach(fila=>{

        fila.style.display =
            fila.innerText
            .toLowerCase()
            .includes(texto)
            ? ""
            : "none";

    });

}

window.onload =
    cargarProductos;

</script>

</body>
</html>
